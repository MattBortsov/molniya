# Static site, no domain/SSL yet — served on a dedicated host port so it
# never collides with another nginx (e.g. SEOSmith) already bound to 80/443
# on the same server. Once a domain is ready, this can be fronted by that
# other nginx or given its own certbot + 443 setup.
name: molniya
services:
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8090:80"
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/security_headers.conf:/etc/nginx/security_headers.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
