# Static site, served on a dedicated host port so it never collides with
# another nginx (e.g. SEOSmith) already bound to 80/443 on the same server.
# Also joins the shared `edge` network so SEOSmith's nginx can reach it by
# container name (molniya-nginx:80) and terminate TLS for molniya-tech.ru.
name: molniya
services:
  nginx:
    image: nginx:alpine
    container_name: molniya-nginx
    restart: unless-stopped
    ports:
      - "8090:80"
    networks:
      - default
      - edge
    volumes:
      - ./:/usr/share/nginx/html:ro
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/security_headers.conf:/etc/nginx/security_headers.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  edge:
    name: edge
    external: true
